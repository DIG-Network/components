name: publish-npm

# Build + test @dignetwork/components and publish it to npmjs. Auth uses npm TRUSTED PUBLISHING
# (OIDC) — no NPM_TOKEN secret. The npm registry exchanges this workflow's GitHub Actions OIDC
# token for a short-lived publish credential (configured npm-side: org DIG-Network, repo
# components, workflow publish-npm.yml), so `npm publish` needs no auth token or env var; npm's
# CLI auto-detects the OIDC token and provenance is generated automatically. Runs when a GitHub
# Release is published (tag-driven), or on manual dispatch. The version published is whatever is
# in package.json on the released commit — bump it before tagging.
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build + test + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Deploy = build + package + publish only. The PR's CI gates (typecheck, coverage, e2e)
      # already tested this exact tree before merge — do not re-run the full suite here (#488:
      # a re-run here was blocking releases on transient/flaky failures after the tree was
      # already verified green).
      - run: npm run build
      # Trusted publishing requires npm CLI >= 11.5.1; Node 22 bundles npm 10.
      - name: upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: publish to npmjs
        run: npm publish --access public
